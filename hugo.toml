baseURL = "https://ailocalbusiness.biz/"
languageCode = "en-us"
title = "AI Local Business"
theme = "PaperMod"
[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = false

# Ignore macOS metadata and other junk files during builds
ignoreFiles = ["\\.DS_Store$"]

[minify]
  disableXML = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "Spencer Scott"
  description = "Local SEO, AI search optimization, and websites that actually perform — for Bergen County and northern New Jersey businesses."
  keywords = ["local SEO", "AI search optimization", "website design", "Bergen County", "digital marketing", "Glen Rock NJ", "AEO", "ChatGPT optimization", "local business marketing"]
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  mainSections = ["blog"]

  [params.assets]
    favicon = "/favicon.ico"
    disableHLJS = true

  # Profile mode disabled — custom homepage in layouts/index.html replaces it.
  [params.profileMode]
    enabled = false

  [params.homeInfoParams]
    Title = "AI Local Business"
    Content = "Local SEO, AI search optimization, and websites that actually perform — for Bergen County businesses."

  [[params.socialIcons]]
    name = "email"
    url = "mailto:spencerscottdigital@gmail.com"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# Main navigation menu
[menu]
  [[menu.main]]
    identifier = "services"
    name = "Services"
    url = "/services/"
    weight = 10

  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "audit"
    name = "Free Audit"
    url = "/audit/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

# Taxonomies for content organization
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSDG SERP Data Viewer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; padding: 20px 24px; line-height: 1.55; }
a { color: #7eb8ff; text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 920px; margin: 0 auto; }
.hdr { margin-bottom: 24px; }
.hdr h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.hdr .sub { font-size: 12px; color: #555; margin-bottom: 14px; }
.kw-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.kw-bar label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
select.kw-sel { background: #1a1d2e; color: #7eb8ff; border: 1px solid #2a3a5f; border-radius: 6px; padding: 8px 14px; font-size: 14px; font-weight: 500; min-width: 300px; }
select.kw-sel option { background: #1a1d2e; color: #e0e0e0; }
.q-box { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 8px; padding: 10px 16px; display: inline-block; margin-bottom: 8px; }
.q-box .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #666; margin-bottom: 1px; }
.q-box .val { font-size: 16px; color: #7eb8ff; font-weight: 600; }
.chips { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.chip { font-size: 11px; color: #999; background: #1a1d2e; padding: 4px 10px; border-radius: 4px; }
.chip b { color: #ccc; font-weight: 500; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; background: #1a1d2e; color: #777; border: 1px solid transparent; transition: all 0.15s; user-select: none; }
.tab:hover { color: #bbb; background: #1e2134; }
.tab.on { background: #1e3a5f; color: #7eb8ff; border-color: #2a5a8f; }
.badge { background: #2a2d3e; color: #999; padding: 1px 6px; border-radius: 10px; font-size: 10px; margin-left: 5px; }
.tab.on .badge { background: #2a5a8f; color: #b0d4ff; }
.pnl { display: none; }
.pnl.on { display: block; }
.card { background: #1a1d2e; border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; }
.lc { border-left: 3px solid #4caf50; }
.lc .pos { font-size: 12px; color: #4caf50; font-weight: 700; margin-bottom: 3px; }
.lc h3 { font-size: 16px; color: #fff; margin-bottom: 5px; }
.stars { color: #ffb74d; font-size: 14px; }
.stars .ct { color: #888; font-size: 12px; margin-left: 4px; }
.meta { font-size: 12px; color: #888; margin-top: 3px; }
.oc { position: relative; padding-left: 40px; }
.oc .rk { position: absolute; left: 12px; top: 14px; background: #2a5a8f; color: #b0d4ff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.oc .dm { font-size: 11px; color: #4caf50; margin-bottom: 1px; }
.oc h3 { font-size: 14px; color: #7eb8ff; font-weight: 500; }
.oc .sn { font-size: 12px; color: #999; margin-top: 3px; }
.aio-box { background: linear-gradient(135deg, #1a1d2e 0%, #1e2240 100%); border: 1px solid #2a3a5f; border-radius: 12px; padding: 20px 24px; }
.aio-box h3 { color: #b0a0ff; font-size: 15px; margin-bottom: 12px; }
.aio-header { font-size: 14px; color: #ccc; margin-bottom: 12px; }
.aio-item { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2a2d3e; }
.aio-item:last-child { border-bottom: none; }
.aio-item .nm { font-size: 14px; color: #7eb8ff; font-weight: 600; min-width: 140px; }
.aio-item .ds { font-size: 13px; color: #aaa; }
.aio-sources { margin-top: 16px; padding-top: 12px; border-top: 1px solid #2a2d3e; }
.aio-sources h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
.aio-src { font-size: 12px; color: #7eb8ff; margin-bottom: 4px; }
.aio-src .dom { color: #666; }
.qa { cursor: pointer; transition: background 0.1s; }
.qa:hover { background: #1e2134; }
.qa .q { font-size: 14px; color: #ccc; font-weight: 500; }
.qa .ans { font-size: 13px; color: #999; margin-top: 6px; display: none; }
.qa.open .ans { display: block; }
.disc h4 { font-size: 14px; color: #ccc; }
.disc .si { font-size: 12px; color: #888; margin-top: 4px; }
.disc .si span { margin-right: 12px; }
.rel-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.rel-tag { background: #1a1d2e; padding: 7px 14px; border-radius: 6px; font-size: 13px; color: #7eb8ff; display: inline-block; }
#err { color: #ff6b6b; padding: 20px; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>SSDG SERP Data Viewer</h1>
    <div class="sub">SSDV &mdash; Spencer Scott Digital Group</div>
  </div>
  <div class="kw-bar">
    <label>Keyword:</label>
    <select class="kw-sel" id="kwSel" onchange="switchKeyword()"></select>
  </div>
  <div id="detail"></div>
  <div id="err"></div>
</div>

<script src="serp-data.js"></script>
<script>
function init() {
  if (typeof ALL === 'undefined') {
    document.getElementById('err').textContent = 'Error: Could not load serp-data.js — make sure it is in the same folder as this HTML file.';
    return;
  }
  var sel = document.getElementById('kwSel');
  for (var i = 0; i < ALL.length; i++) {
    var o = document.createElement('option');
    o.value = i;
    var q = ALL[i].search_parameters ? ALL[i].search_parameters.q : 'Query ' + (i + 1);
    var loc = ALL[i].search_parameters ? ALL[i].search_parameters.location : '';
    o.textContent = q + (loc ? ' \u2014 ' + loc : '');
    sel.appendChild(o);
  }
  render(ALL[0]);
}

function switchKeyword() {
  var sel = document.getElementById('kwSel');
  render(ALL[parseInt(sel.value)]);
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(D) {
  var box = document.getElementById('detail');
  var h = '';
  h += '<div class="q-box"><div class="lbl">Query</div><div class="val">' + esc(D.search_parameters.q) + '</div></div>';
  h += '<div class="chips">';
  var ms = [['Location', D.search_parameters.location],['Engine', D.search_parameters.engine],['Device', D.search_parameters.device],['Total Results', D.search_information && D.search_information.total_results ? D.search_information.total_results.toLocaleString() : null]];
  for (var i = 0; i < ms.length; i++) { if (ms[i][1]) h += '<span class="chip"><b>' + ms[i][0] + ':</b> ' + ms[i][1] + '</span>'; }
  h += '</div>';
  var sects = [];

  if (D.ai_overview) {
    var s = '';
    var contents = D.ai_overview.ai_overview_contents || [];
    for (var i = 0; i < contents.length; i++) {
      if (contents[i].type === 'header') s += '<div class="aio-header">' + esc(contents[i].text) + '</div>';
      if (contents[i].type === 'list') { var list = contents[i].list || []; for (var j = 0; j < list.length; j++) { s += '<div class="aio-item"><span class="nm">' + esc(list[j].header) + '</span><span class="ds">' + esc(list[j].text) + '</span></div>'; } }
    }
    var srcs = D.ai_overview.ai_overview_sources || [];
    if (srcs.length) { s += '<div class="aio-sources"><h4>Sources</h4>'; for (var i = 0; i < srcs.length; i++) { s += '<div class="aio-src"><a href="' + esc(srcs[i].source_url) + '" target="_blank">' + esc(srcs[i].source_title) + '</a> <span class="dom">(' + esc(srcs[i].source_domain) + ')</span></div>'; } s += '</div>'; }
    sects.push({ id: 'aio', label: 'AI Overview', n: contents.length, html: '<div class="aio-box"><h3>AI Overview</h3>' + s + '</div>' });
  }

  if (D.local_results && D.local_results.length) {
    var s = '';
    for (var i = 0; i < D.local_results.length; i++) {
      var r = D.local_results[i]; var st = '';
      if (r.rating) { for (var x = 0; x < Math.floor(r.rating); x++) st += '\u2605'; if (r.rating % 1 >= 0.5) st += '\u00BD'; }
      s += '<div class="card lc"><div class="pos">Local Pack #' + (i+1) + '</div><h3>' + esc(r.title) + '</h3>';
      if (r.rating) s += '<div class="stars">' + st + ' ' + r.rating + ' <span class="ct">(' + r.reviews + ' reviews)</span></div>';
      if (r.address) s += '<div class="meta">' + esc(r.address) + '</div>';
      if (r.phone) s += '<div class="meta">' + esc(r.phone) + '</div>';
      if (r.hours) s += '<div class="meta">' + esc(r.hours) + '</div>';
      if (r.type) s += '<div class="meta" style="color:#b0a0ff">' + esc(r.type) + '</div>';
      s += '</div>';
    }
    sects.push({ id: 'local', label: 'Local Pack', n: D.local_results.length, html: s });
  }

  if (D.organic_results && D.organic_results.length) {
    var s = '';
    for (var i = 0; i < D.organic_results.length; i++) {
      var r = D.organic_results[i];
      s += '<div class="card oc"><div class="rk">' + r.position + '</div><div class="dm">' + esc(r.domain || '') + '</div>';
      s += '<h3><a href="' + esc(r.link) + '" target="_blank">' + esc(r.title) + '</a></h3>';
      if (r.snippet) s += '<div class="sn">' + esc(r.snippet) + '</div>';
      s += '</div>';
    }
    sects.push({ id: 'org', label: 'Organic', n: D.organic_results.length, html: s });
  }

  if (D.related_questions && D.related_questions.length) {
    var s = '';
    for (var i = 0; i < D.related_questions.length; i++) {
      var r = D.related_questions[i];
      s += '<div class="card qa" onclick="this.classList.toggle(\'open\')"><div class="q">' + esc(r.question) + '</div>';
      s += '<div class="ans">' + esc(r.answer || '');
      if (r.source) s += '<br><span style="color:#4caf50;font-size:11px">' + esc(r.source.title) + '</span>';
      s += '</div></div>';
    }
    sects.push({ id: 'paa', label: 'People Also Ask', n: D.related_questions.length, html: s });
  }

  if (D.discussions_and_forums && D.discussions_and_forums.length) {
    var s = '';
    for (var i = 0; i < D.discussions_and_forums.length; i++) {
      var d = D.discussions_and_forums[i];
      s += '<div class="card disc"><h4><a href="' + esc(d.link) + '" target="_blank">' + esc(d.discussion_title) + '</a></h4>';
      s += '<div class="si"><span>' + esc((d.source.source_title || '') + ' ' + d.source.domain) + '</span>';
      if (d.source.comments_count) s += '<span>' + esc(d.source.comments_count) + '</span>';
      if (d.source.time) s += '<span>' + esc(d.source.time) + '</span>';
      s += '</div></div>';
    }
    sects.push({ id: 'disc', label: 'Discussions', n: D.discussions_and_forums.length, html: s });
  }

  if (D.related_searches && D.related_searches.length) {
    var s = '<div class="rel-grid">';
    for (var i = 0; i < D.related_searches.length; i++) { s += '<a class="rel-tag" href="' + (D.related_searches[i].link || '#') + '" target="_blank">' + esc(D.related_searches[i].query) + '</a>'; }
    s += '</div>';
    sects.push({ id: 'rel', label: 'Related Searches', n: D.related_searches.length, html: s });
  }

  h += '<div class="tabs">';
  for (var i = 0; i < sects.length; i++) { h += '<div class="tab' + (i === 0 ? ' on' : '') + '" onclick="switchTab(this,\'' + sects[i].id + '\')">' + sects[i].label + '<span class="badge">' + sects[i].n + '</span></div>'; }
  h += '</div>';
  for (var i = 0; i < sects.length; i++) { h += '<div class="pnl' + (i === 0 ? ' on' : '') + '" data-sect="' + sects[i].id + '">' + sects[i].html + '</div>'; }
  box.innerHTML = h;
}

function switchTab(el, id) {
  var box = document.getElementById('detail');
  var tabs = box.querySelectorAll('.tab');
  var pnls = box.querySelectorAll('.pnl');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('on');
  for (var i = 0; i < pnls.length; i++) pnls[i].classList.remove('on');
  el.classList.add('on');
  var targets = box.querySelectorAll('.pnl[data-sect="' + id + '"]');
  for (var i = 0; i < targets.length; i++) targets[i].classList.add('on');
}

init();
</script>
</body>
</html>
